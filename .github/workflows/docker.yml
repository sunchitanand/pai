name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io

jobs:
  # Auto-tag main branch pushes with incrementing alpha versions
  auto-tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next alpha tag
        id: tag
        run: |
          # Find latest v*-alpha.* tag
          LATEST=$(git tag --list 'v*-alpha.*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            # No alpha tags exist — start from v0.3.0-alpha.1
            NEW_TAG="v0.3.0-alpha.1"
          else
            # Extract base version and alpha number, increment
            BASE=$(echo "$LATEST" | sed 's/-alpha\.[0-9]*//')
            NUM=$(echo "$LATEST" | grep -o 'alpha\.[0-9]*' | cut -d. -f2)
            NEXT=$((NUM + 1))
            NEW_TAG="${BASE}-alpha.${NEXT}"
          fi
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Auto-tagging: $NEW_TAG"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.new_tag }}" -m "${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

  build-and-push:
    # On main push: wait for auto-tag. On manual tag push: run directly.
    # The auto-tag job's git push does NOT re-trigger this workflow because
    # events from GITHUB_TOKEN don't trigger further workflow runs.
    needs: [auto-tag]
    if: always() && (needs.auto-tag.result == 'success' || needs.auto-tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: pai
            context: "."
            dockerfile: Dockerfile
            image_suffix: ""
          - service: sandbox
            context: "./sandbox"
            dockerfile: sandbox/Dockerfile
            image_suffix: "-sandbox"
          - service: searxng
            context: "./searxng"
            dockerfile: searxng/Dockerfile
            image_suffix: "-searxng"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute image tags
        id: resolve
        run: |
          IMAGE="${{ env.REGISTRY_GHCR }}/${{ github.repository }}${{ matrix.image_suffix }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ needs.auto-tag.outputs.new_tag }}"
          fi
          # Strip leading 'v' for Docker tags
          VERSION="${VERSION#v}"
          # Extract major.minor for rolling tag (e.g. 0.3)
          MINOR=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+')
          # Build tag list
          TAGS="${IMAGE}:${VERSION}"
          TAGS="${TAGS},${IMAGE}:${MINOR}"
          TAGS="${TAGS},${IMAGE}:latest"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.resolve.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
