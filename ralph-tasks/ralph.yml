# Ralph Orchestrator Configuration

cli:
  backend: "kiro"

event_loop:
  prompt_file: "ui-polish.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 200
  max_runtime_seconds: 14400
  checkpoint_interval: 5

core:
  guardrails:
    - "Follow existing code patterns — read neighboring files before writing new code"
    - "Do not modify or delete existing unit tests unless they test removed functionality"
    - "Do not commit ralph.yml, PROMPT.md, .ralph/, or .kiro/ — do not add them to .gitignore either"

memories:
  enabled: true
  inject: auto
  budget: 2000

tasks:
  enabled: true

features:
  preflight:
    enabled: true
    strict: false
